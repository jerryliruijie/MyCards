name: Web CI

on:
  push:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: |
          cd apps/web
          npm ci
      - name: Lint
        run: |
          cd apps/web
          npm run lint
      - name: Test
        run: |
          cd apps/web
          npm run test
